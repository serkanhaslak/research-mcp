name = "research-mcp"
main = "src/worker.ts"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespaces
[[kv_namespaces]]
binding = "OAUTH_TOKENS"
id = "placeholder_oauth_tokens_kv_id"

[[kv_namespaces]]
binding = "MCP_SESSIONS"
id = "placeholder_mcp_sessions_kv_id"

# Observability (replaces custom usage tracker)
[observability]
enabled = true

# Public vars
[vars]
SERVER_NAME = "research-mcp"
SERVER_VERSION = "5.0.0"
MCP_PROTOCOL_VERSION = "2025-11-25"
SESSION_TTL_SECONDS = "1800"
MAX_SESSIONS = "100"
DEFAULT_REASONING_EFFORT = "high"
DEFAULT_MAX_URLS = "100"
API_TIMEOUT_MS = "300000"

# Custom domain
[[routes]]
pattern = "research.pragmaticgrowth.com"
custom_domain = true

# Dev
[env.dev]
name = "research-mcp-dev"
